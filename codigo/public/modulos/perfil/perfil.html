                </svg>
                Login
            </div>
        </div>
    </aside>

    <div class="container perfil-container">

        <div class="perfil-card">
            <h1>Meu Perfil</h1>
            <p class="perfil-subtitulo">Visualize e edite suas informações de cadastro.</p>

            <div id="alerta-perfil" class="alerta-msg" style="display:none;"></div>

            <form id="form-perfil">
                <div class="campo-grupo">
                    <label for="input-nome">Nome</label>
                    <input type="text" id="input-nome" disabled required>
                </div>

                <div class="campo-grupo">
                    <label for="input-login">Login</label>
                    <input type="text" id="input-login" disabled>
                </div>

                <div class="campo-grupo">
                    <label for="input-email">E-mail</label>
                    <input type="email" id="input-email" disabled required>
                </div>

                <div class="campo-grupo">
                    <label for="input-senha">Senha</label>
                    <input type="password" id="input-senha" disabled required>
                </div>

                <div class="perfil-botoes">
                    <button type="button" id="btn-editar" class="btn-primario">Editar dados</button>
                    <button type="submit" id="btn-salvar" class="btn-primario" style="display:none;">Salvar alterações</button>
                    <button type="button" id="btn-cancelar" class="btn-secundario" style="display:none;">Cancelar</button>
                </div>
            </form>
        </div>

    </div>

    <div id="modal-verificacao" class="modal-overlay" style="display:none;">
        <div class="modal-box">
            <h2>Confirmação de segurança</h2>
            <p id="modal-texto">Enviamos um código de verificação para o seu e-mail.</p>
            <p class="email-mascarado" id="email-mascarado"></p>

            <div class="campo-grupo">
                <label for="input-codigo">Código de verificação</label>
                <input type="text" id="input-codigo" maxlength="4" placeholder="0000" autocomplete="off">
            </div>

            <div id="alerta-codigo" class="alerta-msg" style="display:none;"></div>

            <div class="perfil-botoes">
                <button type="button" id="btn-confirmar-codigo" class="btn-primario">Confirmar</button>
                <button type="button" id="btn-cancelar-codigo" class="btn-secundario">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="../../assets/js/perfil.js"></script>
</body>
