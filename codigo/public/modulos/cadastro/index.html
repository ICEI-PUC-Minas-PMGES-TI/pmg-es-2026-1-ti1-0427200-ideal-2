<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Cadastro</title>

    <link rel="stylesheet" href="/public/assets/css/cadastro.css">
</head>

<body>

   
    <nav class="menu">
        
        <div>

            <img src="../../assets/images/logo.png" alt="logo" class="logo">

            <a id="menu_inicio" class="itens">
                <div class="Inicio menu-links">
                    <img src="../../assets/images/iconHome.png" class="icon">
                    <p>Inicio</p>
                </div>
            </a>

            <a id="menu_mapa" class="itens">
                <div class="item_mapa menu-links">
                    <img src="../../assets/images/iconMap.png" class="icon">
                    <p>Mapa</p>
                </div>
            </a>

            <a id="menu_planejar" class="itens">
                <div class="item_planejar menu-links">
                    <img src="../../assets/images/iconCompass.png" class="icon">
                    <p>Planejar Viagem</p>
                </div>
            </a>

            <a id="menu_simular" class="itens">
                <div class="item_simular menu-links">
                    <img src="../../assets/images/iconFlash.png" class="icon">
                    <p>Simular Recarga</p>
                </div>
            </a>

            <a id="menu_favoritos" class="itens">
                <div class="item_favoritos menu-links">
                    <img src="../../assets/images/iconHeart.png" class="icon">
                    <p>Favoritos</p>
                </div>
            </a>

            <a id="menu_historico" class="itens">
                <div class="item_historico menu-links">
                    <img src="../../assets/images/iconHistory.png" class="icon">
                    <p>Histórico</p>
                </div>
            </a>

        </div>

        <div>

            <a id="menu_login" class="itens">
                <div class="item_login menu-links">
                    <img src="../../assets/images/iconLogin.png" class="icon">
                    <p>Login</p>
                </div>
            </a>

        </div>

    </nav>

    
    <div class="conteudo">

        <form id="formCadastro">

            <h1>Cadastro</h1>

            <label>Nome:</label>
            <input type="text" id="nome">

            <label>E-mail:</label>
            <input type="email" id="email">

            <label>Senha:</label>
            <input type="password" id="senha">

            <label>Confirmar senha:</label>
            <input type="password" id="confirmarSenha">

            <button type="submit">Cadastrar</button>

            <p id="mensagem"></p>

        </form>

    </div>

    
    <script>
        const form = document.getElementById("formCadastro");
        const mensagem = document.getElementById("mensagem");

        form.addEventListener("submit", function(event) {
            event.preventDefault();

            const nome = document.getElementById("nome").value;
            const email = document.getElementById("email").value;
            const senha = document.getElementById("senha").value;
            const confirmarSenha = document.getElementById("confirmarSenha").value;

            if (nome === "" || email === "" || senha === "" || confirmarSenha === "") {
                mensagem.innerText = "Preencha todos os campos!";
                mensagem.style.color = "red";
                return;
            }

            if (senha.length < 6) {
                mensagem.innerText = "A senha deve ter pelo menos 6 caracteres.";
                mensagem.style.color = "red";
                return;
            }

            if (senha !== confirmarSenha) {
                mensagem.innerText = "As senhas não coincidem!";
                mensagem.style.color = "red";
                return;
            }

            mensagem.innerText = "Cadastro realizado com sucesso!";
            mensagem.style.color = "green";

            console.log({ nome, email, senha });

            form.reset();
        });
    </script>

</body>

</html>
