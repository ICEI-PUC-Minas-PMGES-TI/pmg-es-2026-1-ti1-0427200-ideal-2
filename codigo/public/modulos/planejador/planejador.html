<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../../assets/css/planejadorStyle.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planejador</title>
</head>
<body>
    <nav class="menu">
        <div>
            <img src="../../assets/images/logo.png" alt="logo" class="logo">
            <a id="menu_inicio" class="itens">
                <div class="Inicio menu-links">
                    <img src="../../assets/images/iconHome.png" class="icon">
                    <p>Inicio</p>
                </div>
            </a>
            <a id="menu_mapa" class="itens">
                <div class="item_mapa menu-links">
                    <img src="../../assets/images/iconMap.png" class="icon">
                    <p>Mapa</p>
                </div>
            </a>
            <a id="menu_planejar" class="itens">
                <div class="item_planejar menu-links">
                    <img src="../../assets/images/iconCompass.png" class="icon">
                    <p>Planejar Viajem</p>
                </div>
            </a>
            <a id="menu_simular" class="itens">
                <div class="item_simular menu-links">
                    <img src="../../assets/images/iconFlash.png" class="icon">
                    <p>Simular Recarga</p>
                </div>
            </a>
            <a id="menu_favoritos" class="itens">
                <div class="item_favoritos menu-links">
                    <img src="../../assets/images/iconHeart.png" class="icon">
                    <p>Favoritos</p>
                </div>
            </a>
            <a id="menu_historico" class="itens">
                <div class="item_historico menu-links">
                    <img src="../../assets/images/iconHistory.png" class="icon">
                    <p>Histórico</p>
                </div>
            </a>
        </div>
        <div>
            <a id="menu_login" class="itens">
                <div class="item_login menu-links">
                    <img src="../../assets/images/iconLogin.png" class="icon">
                    <p>Login</p>
                </div>
            </a>
        </div>
    </nav>
    <main>
        <section>
            <div class="endereco">
                <img src="../../assets/images/iconPin.png" class="icon">
                <input id="saida" type="text">
            </div>
            <div class="endereco">
                <img src="../../assets/images/iconPin.png" class="icon">
                <input id="chegada" type="text">
            </div>
            <button class="btnCalcular" id="btnCalcular">Calcular</button>
        </section>
        <section>
            <img src="https://rech.com.br/wp-content/uploads/2019/07/erp_siger_rotas_google_maps_13092017.jpg" alt="">
        </section>
        <section class="results" id="results">
            <div class="tempo">
                <p>Tempo estimado:</p>
            </div>
            <p>__________________________________________________________________________</p>
            <div class="distancia">
                <p>Distancia estimado:</p>
            </div>
        </section>
    </main>
</body>
<script src="../../assets/js/planejadorScript.js"></script>
</html>
