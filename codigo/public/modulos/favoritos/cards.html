<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Meus Favoritos</title>
  <link rel="stylesheet" href="../../assets/css/favoritos.css" />
</head>
<body>

  <div class="layout">

    <aside class="sidebar">
      <nav class="menu">
        <a href="#" class="menu-item">
          <span>Início</span>
        </a>
        <a href="#" class="menu-item">
          <span>Mapa</span>
        </a>
        <a href="#" class="menu-item">
          <span>Planejar Viagem</span>
        </a>
        <a href="#" class="menu-item">
          <span>Simular Recarga</span>
        </a>
        <a href="cards.html" class="menu-item ativo">
          <span>Favoritos</span>
        </a>
        <a href="#" class="menu-item">
          <span>Histórico</span>
        </a>
      </nav>

      <div class="login">
        <a href="#" class="menu-item">
          <span>Login</span>
        </a>
      </div>
    </aside>

    <main class="conteudo">
      <input type="text" id="pesquisa" placeholder="Pesquisar por nome, endereço ou cidade..." />

      <div class="barra-acoes">
        <div id="filtros">
          <button class="filtro-btn ativo" data-status="todos">Todos</button>
          <button class="filtro-btn" data-status="disponivel">Disponível</button>
          <button class="filtro-btn" data-status="ocupada">Ocupada</button>
          <button class="filtro-btn" data-status="fora-de-servico">Fora de serviço</button>
        </div>
        <button id="btn-adicionar">+ Adicionar favorito</button>
      </div>

      <div id="lista"></div>
    </main>

  </div>

  <!-- Modal de adicionar favorito (escondido por padrão; o JS mostra quando precisa) -->
  <div id="modal-adicionar" class="modal-overlay" hidden>
    <div class="modal">
      <div class="modal-cabecalho">
        <h2>Adicionar aos favoritos</h2>
        <button class="modal-fechar" id="modal-fechar" aria-label="Fechar">×</button>
      </div>
      <div id="modal-lista"></div>
    </div>
  </div>

  <script src="../../assets/js/cards-render.js"></script>

</body>
</html>
