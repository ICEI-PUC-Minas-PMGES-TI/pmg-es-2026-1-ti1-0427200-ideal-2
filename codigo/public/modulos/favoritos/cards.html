<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Postos</title>
  <link rel="stylesheet" href="favoritos.css" />
</head>
<body>

  <div id="lista"></div>

  <script src="cards.js"></script>
  <script>
    const lista = document.getElementById("lista");

    postos.forEach(function(posto) {
      const card = document.createElement("div");
      card.classList.add("card");

      card.innerHTML =
        "<img src='" + posto.imagem + "' alt='posto' />" +
        "<div class='card-info'>" +
          "<strong>" + posto.nome + "</strong>" +
          "<span>" + posto.endereco + " — " + posto.cidade + "</span>" +
        "</div>" +
        "<a href='detalhe.html?id=" + posto.id + "'><button>Ver detalhes</button></a>";

      lista.appendChild(card);
    });
  </script>

</body>
</html>
