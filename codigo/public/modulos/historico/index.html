<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EV Charge App</title>
  <link rel="stylesheet" href="/codigo/public/modulos/historico/index.html" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet"/>
</head>
<body>

  <div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-box">
          <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <line x1="5" y1="5" x2="35" y2="35" stroke="#222" stroke-width="2"/>
            <line x1="35" y1="5" x2="5" y2="35" stroke="#222" stroke-width="2"/>
            <polygon points="20,6 26,20 20,17 14,20" fill="#111"/>
          </svg>
        </div>
      </div>

      <nav class="sidebar-nav">
        <a href="#" class="nav-item active">
          <span class="material-icons-outlined">home</span>
          <span>Inicio</span>
        </a>
        <a href="#" class="nav-item">
          <span class="material-icons-outlined">map</span>
          <span>Mapa</span>
        </a>
        <a href="#" class="nav-item">
          <span class="material-icons-outlined">explore</span>
          <span>Planejar Viagem</span>
        </a>
        <a href="#" class="nav-item">
          <span class="material-icons-outlined">bolt</span>
          <span>Simular Recarga</span>
        </a>
        <a href="#" class="nav-item">
          <span class="material-icons-outlined">favorite_border</span>
          <span>Favoritos</span>
        </a>
        <a href="#" class="nav-item">
          <span class="material-icons-outlined">history</span>
          <span>Histórico</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <a href="#" class="nav-item">
          <span class="material-icons-outlined">account_circle</span>
          <span>Login</span>
        </a>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">

      <!-- Filter -->
      <div class="filter-row">
        <div class="filter-select">
          <select>
            <option>Filtro</option>
            <option>Tipo A</option>
            <option>Tipo B</option>
            <option>Tipo C</option>
          </select>
          <span class="material-icons-outlined select-icon">expand_more</span>
        </div>
      </div>

      <!-- Cards -->
      <div class="card-list">
        <div class="card">
          <p class="card-label">Dados</p>
        </div>
        <div class="card">
          <p class="card-label">Dados</p>
        </div>
        <div class="card">
          <p class="card-label">Dados</p>
        </div>
        <div class="card">
          <p class="card-label">Dados</p>
        </div>
      </div>

    </main>
  </div>

</body>
</html>
