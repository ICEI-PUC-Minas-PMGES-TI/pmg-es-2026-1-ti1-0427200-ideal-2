    <main>
        <form id="formPosto">
            <h1 id="titulo"></h1>
            <div>
                <label for="nome">Nome</label>
                <input
                    type="text"
                    id="nome"
                    name="nome"
                    placeholder="Nome do posto"
                    required
                >
            </div>
            <div>
                <label for="endereco">Endereço</label>
                <input
                    type="text"
                    id="endereco"
                    name="endereco"
                    placeholder="Rua, avenida, número"
                    required
                >
            </div>
            <div>
                <label for="cidade">Cidade</label>
                <input
                    type="text"
                    id="cidade"
                    name="cidade"
                    placeholder="Cidade"
                    required
                >
            </div>
            <div>
                <label for="telefone">Telefone</label>
                <input
                    type="tel"
                    id="telefone"
                    name="telefone"
                    placeholder="(31) 99999-9999"
                    required
                >
            </div>
            <div>
                <label for="horario">Horário de Funcionamento</label>
                <input
                    type="text"
                    id="horario"
                    name="horario"
                    placeholder="Ex: 24 horas ou 08:00 às 18:00"
                    required
                >
            </div>
            <div>
                <label for="imagem">Imagem</label>
                <input
                    type="text"
                    id="imagem"
                    name="imagem"
                    placeholder="URL"
                    required
                >
            </div>
            <button type="submit" id="btnSubmit">Salvar Posto</button>
        </form>
    </main>
