<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../../assets/css/postos.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postos</title>
</head>
<body>
    <nav class="menu">
        <div>
            <img src="../../assets/images/logo.png" alt="logo" class="logo">
            <a id="menu_inicio" class="itens">
                <div class="Inicio menu-links">
                    <img src="../../assets/images/iconHome.png" class="icon">
                    <p>Inicio</p>
                </div>
            </a>
            <a id="menu_mapa" class="itens">
                <div class="item_mapa menu-links">
                    <img src="../../assets/images/iconMap.png" class="icon">
                    <p>Mapa</p>
                </div>
            </a>
            <a id="menu_planejar" class="itens">
                <div class="item_planejar menu-links">
                    <img src="../../assets/images/iconCompass.png" class="icon">
                    <p>Planejar Viajem</p>
                </div>
            </a>
            <a id="menu_simular" class="itens">
                <div class="item_simular menu-links">
                    <img src="../../assets/images/iconFlash.png" class="icon">
                    <p>Simular Recarga</p>
                </div>
            </a>
            <a id="menu_favoritos" class="itens">
                <div class="item_favoritos menu-links">
                    <img src="../../assets/images/iconHeart.png" class="icon">
                    <p>Favoritos</p>
                </div>
            </a>
            <a id="menu_historico" class="itens">
                <div class="item_historico menu-links">
                    <img src="../../assets/images/iconHistory.png" class="icon">
                    <p>Histórico</p>
                </div>
            </a>
        </div>
        <div>
            <a id="menu_login" class="itens">
                <div class="item_login menu-links">
                    <img src="../../assets/images/iconLogin.png" class="icon">
                    <p>Login</p>
                </div>
            </a>
        </div>
    </nav>
    <main>
        <form id="formPosto">
            <div>
                <label for="nome">Nome</label>
                <input
                    type="text"
                    id="nome"
                    name="nome"
                    placeholder="Nome do posto"
                    required
                >
            </div>
            <div>
                <label for="endereco">Endereço</label>
                <input
                    type="text"
                    id="endereco"
                    name="endereco"
                    placeholder="Rua, avenida, número"
                    required
                >
            </div>
            <div>
                <label for="cidade">Cidade</label>
                <input
                    type="text"
                    id="cidade"
                    name="cidade"
                    placeholder="Cidade"
                    required
                >
            </div>
            <div>
                <label for="telefone">Telefone</label>
                <input
                    type="tel"
                    id="telefone"
                    name="telefone"
                    placeholder="(31) 99999-9999"
                    required
                >
            </div>
            <div>
                <label for="horario">Horário de Funcionamento</label>
                <input
                    type="text"
                    id="horario"
                    name="horario"
                    placeholder="Ex: 24 horas ou 08:00 às 18:00"
                    required
                >
            </div>
            <div>
                <label for="imagem">Imagem</label>
                <input
                    type="text"
                    id="imagem"
                    name="imagem"
                    placeholder="URL"
                    required
                >
            </div>
            <button type="submit">Salvar Posto</button>
        </form>
    </main>
</body>
<script type="module" src="../../assets/js/editPosto.js"></script>
</html>
