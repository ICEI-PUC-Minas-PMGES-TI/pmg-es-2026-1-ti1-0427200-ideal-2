<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simulação de Recarga</title>
  <link rel="stylesheet" href="../../assets/css/simulador.css" />
</head>
<body>

  <nav class="menu">
    <div>
      <img src="../../assets/images/logo.png" alt="logo" class="logo">
      <a id="menu_inicio" class="itens">
        <div class="Inicio menu-links">
          <img src="../../assets/images/iconHome.png" class="icon">
          <p>Inicio</p>
        </div>
      </a>
      <a id="menu_mapa" class="itens">
        <div class="item_mapa menu-links">
          <img src="../../assets/images/iconMap.png" class="icon">
          <p>Mapa</p>
        </div>
      </a>
      <a id="menu_planejar" class="itens">
        <div class="item_planejar menu-links">
          <img src="../../assets/images/iconCompass.png" class="icon">
          <p>Planejar Viajem</p>
        </div>
      </a>
      <a id="menu_simular" class="itens active">
        <div class="item_simular menu-links">
          <img src="../../assets/images/iconFlash.png" class="icon">
          <p>Simular Recarga</p>
        </div>
      </a>
      <a id="menu_favoritos" class="itens">
        <div class="item_favoritos menu-links">
          <img src="../../assets/images/iconHeart.png" class="icon">
          <p>Favoritos</p>
        </div>
      </a>
      <a id="menu_historico" class="itens">
        <div class="item_historico menu-links">
          <img src="../../assets/images/iconHistory.png" class="icon">
          <p>Histórico</p>
        </div>
      </a>
    </div>
    <div>
      <a id="menu_login" class="itens">
        <div class="item_login menu-links">
          <img src="../../assets/images/iconLogin.png" class="icon">
          <p>Login</p>
        </div>
      </a>
    </div>
  </nav>

  <main>
    <h1>Simulação de Recarga</h1>

    <div class="card">
      <div class="form-grid">

        <div class="field">
          <label for="charge-range">Meta de Carga</label>
          <div class="slider-row">
            <input type="range" id="charge-range" min="0" max="100" value="0" />
            <span class="slider-val" id="slider-pct">0%</span>
          </div>
        </div>

        <div class="field">
          <label for="current-range">Carga Atual</label>
          <div class="slider-row">
            <input type="range" id="current-range" min="0" max="100" value="0" />
            <span class="slider-val" id="current-pct">0%</span>
          </div>
        </div>

        <div class="field full">
          <label for="charger-select">Tipo de Carregador</label>
          <select id="charger-select">
            <optgroup label="AC — Corrente Alternada">
              <option>AC Monofásico — 3,7 kW</option>
              <option>AC Bifásico — 7,4 kW</option>
              <option>AC Trifásico — 11 kW</option>
              <option>AC Trifásico — 22 kW</option>
            </optgroup>
            <optgroup label="DC — Corrente Contínua">
              <option>DC Rápido — 50 kW</option>
              <option>DC Rápido — 100 kW</option>
              <option>DC Ultra-Rápido — 150 kW</option>
              <option>DC Ultra-Rápido — 350 kW</option>
            </optgroup>
          </select>
        </div>

      </div>

      <div class="result-inline" id="result-inline">
        <div class="result-item">
          <span class="val" id="res-time">—</span>
          <span class="lbl">Tempo Est.</span>
        </div>
        <div class="result-divider"></div>
        <div class="result-item">
          <span class="val" id="res-energy">—</span>
          <span class="lbl">Energia</span>
        </div>
      </div>

      <div class="btn-row">
        <button class="btn btn-primary" onclick="simular()">Simular</button>
        <button class="btn btn-ghost" onclick="resetar()">Resetar</button>
      </div>
    </div>

    <div class="history-section">
      <div class="history-header-row">
        <h2>Histórico</h2>
      </div>
      <div class="history-box">
        <div class="history-empty" id="history-empty">Nenhuma simulação realizada ainda.</div>
        <table id="history-table" style="display:none;">
          <thead>
            <tr>
              <th>Sessão</th>
              <th>Meta</th>
              <th>Carregador</th>
              <th>Tempo Est.</th>
              <th>Data</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="history-tbody"></tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="/codigo/public/assets/js/simulador.js"></script>
</body>
</html>
